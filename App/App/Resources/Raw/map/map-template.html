<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta
        http-equiv="Content-Security-Policy"
        content="default-src 'self' data: blob: https://tile.openstreetmap.org https://*.tile.openstreetmap.org; img-src 'self' data: blob: https://tile.openstreetmap.org https://*.tile.openstreetmap.org; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://tile.openstreetmap.org https://*.tile.openstreetmap.org;" />
    <title>Leaflet Map</title>
    <style>
/*__LEAFLET_CSS__*/
    </style>
    <style>
        html,
        body,
        #map {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 28%),
                linear-gradient(180deg, #eef4f8 0%, #dfe9f2 100%);
        }

        #map {
            background:
                linear-gradient(135deg, rgba(13, 110, 253, 0.06), rgba(255, 255, 255, 0.08)),
                #e8eef3;
        }

        .leaflet-control-attribution {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            margin: 0 10px 10px 0;
            padding: 3px 8px;
            font-size: 10px;
        }

        .leaflet-tooltip.poi-tooltip {
            background: rgba(17, 24, 39, 0.88);
            border: none;
            border-radius: 999px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18);
            color: #f8fafc;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 10px;
        }

        .leaflet-tooltip.poi-tooltip::before {
            display: none;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
//__LEAFLET_JS__
    </script>
    <script>
//__MAP_APP_JS__
    </script>
</body>
</html>
