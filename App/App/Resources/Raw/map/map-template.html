<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta
        http-equiv="Content-Security-Policy"
        content="default-src 'self' data: blob: http: https: appbridge:; img-src 'self' data: blob: http: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' data: blob: http: https:; frame-src 'self' appbridge:;" />
    <title>Leaflet Map</title>
    <style>
/*__LEAFLET_CSS__*/
    </style>
    <style>
        html,
        body,
        #map {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 28%),
                linear-gradient(180deg, #eef4f8 0%, #dfe9f2 100%);
        }

        #map {
            background:
                linear-gradient(135deg, rgba(13, 110, 253, 0.06), rgba(255, 255, 255, 0.08)),
                #e8eef3;
        }

        .leaflet-control-attribution {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            margin: 0 10px 10px 0;
            padding: 3px 8px;
            font-size: 10px;
        }

        .leaflet-tooltip.poi-tooltip {
            background: rgba(17, 24, 39, 0.88);
            border: none;
            border-radius: 999px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18);
            color: #f8fafc;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 10px;
        }

        .leaflet-tooltip.poi-tooltip::before {
            display: none;
        }

        .leaflet-popup.poi-popup-shell .leaflet-popup-content-wrapper {
            border-radius: 16px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.2);
            padding: 0;
        }

        .leaflet-popup.poi-popup-shell .leaflet-popup-content {
            margin: 0;
            min-width: 220px;
        }
        .leaflet-popup-content {
            overflow: visible !important;
        }

        .leaflet-popup.poi-popup-shell .leaflet-popup-tip {
            box-shadow: none;
        }

        .poi-popup {
            color: #1f2937;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .poi-popup__title {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.35;
            margin-bottom: 6px; /* thêm */
        }

        .poi-popup__image {
            border-radius: 10px;
            display: block;
            width: 100%;
            height: auto;
            max-height: 150px;
            object-fit: cover;
            margin: 8px 0 12px 0;
            position: relative;
            z-index: 1;
        }

        .poi-popup__description {
            display: block;
            clear: both;
            color: #4b5563;
            font-size: 12px;
            line-height: 1.55;
            margin-top: 10px;
            max-height: 130px;
            overflow-y: auto;
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
//__LEAFLET_JS__
    </script>
    <script>
//__MAP_APP_JS__
    </script>
</body>
</html>
