name: MAUI Android CI

on:
  push:
    paths:
      - "App/**"
      - ".github/workflows/maui-android-ci.yml"
  pull_request:
    paths:
      - "App/**"
      - ".github/workflows/maui-android-ci.yml"

jobs:
  build-android:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore MAUI workloads
        run: dotnet workload restore App/App/App.csproj

      - name: Restore
        run: dotnet restore App/App/App.csproj

      - name: Build Android Debug
        run: dotnet build App/App/App.csproj --framework net10.0-android --configuration Debug --no-restore